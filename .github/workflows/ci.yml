name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: relaydock
          POSTGRES_USER: relaydock
          POSTGRES_PASSWORD: relaydock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relaydock -d relaydock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://relaydock:relaydock@127.0.0.1:5432/relaydock?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm --filter @relaydock/server prisma:deploy
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:agent:race
      - run: pnpm build
