name: relaydock

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-relaydock}
      POSTGRES_USER: ${POSTGRES_USER:-relaydock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - '127.0.0.1:${RELAYDOCK_POSTGRES_PORT:-5432}:5432'
    volumes:
      - relaydock-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-relaydock} -d ${POSTGRES_DB:-relaydock}']
      interval: 5s
      timeout: 5s
      retries: 12

  server:
    profiles: ['app']
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-relaydock}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-relaydock}?schema=public
      RELAYDOCK_HOST: 0.0.0.0
      RELAYDOCK_PORT: 3000
      RELAYDOCK_WEB_ORIGIN: ${RELAYDOCK_WEB_ORIGIN:?set RELAYDOCK_WEB_ORIGIN in .env}
      RELAYDOCK_ALLOW_REGISTRATION: ${RELAYDOCK_ALLOW_REGISTRATION:-false}
      RELAYDOCK_TRUST_PROXY: 'true'
      RELAYDOCK_SESSION_PEPPER: ${RELAYDOCK_SESSION_PEPPER:?set RELAYDOCK_SESSION_PEPPER in .env}
      RELAYDOCK_CREDENTIAL_PEPPER: ${RELAYDOCK_CREDENTIAL_PEPPER:?set RELAYDOCK_CREDENTIAL_PEPPER in .env}
      RELAYDOCK_JOB_RETENTION_DAYS: ${RELAYDOCK_JOB_RETENTION_DAYS:-30}
      RELAYDOCK_MAX_JOB_OUTPUT_BYTES: ${RELAYDOCK_MAX_JOB_OUTPUT_BYTES:-10485760}
      RELAYDOCK_LOG_LEVEL: ${RELAYDOCK_LOG_LEVEL:-info}
      # Web Push (VAPID). All three together enable job notifications; left unset
      # they resolve to empty strings, which the server treats as "not configured"
      # (push stays inert). See docs/notifications.md.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    profiles: ['app']
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '${RELAYDOCK_HTTP_PORT:-8080}:8080'

volumes:
  relaydock-postgres:
